<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Hole Lensing Simulator</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* Base Setup */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030305;
            font-family: 'Assistant', sans-serif;
            color: #eee;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Canvas */
        #simCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: crosshair;
        }

        /* Control Panel Animations & Style */
        #controlPanel {
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .panel-hidden {
            transform: translateY(100%);
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            height: 24px;
            cursor: pointer;
        }
        input[type=range]:focus { outline: none; }
        
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            transition: background 0.2s;
        }
        input[type=range]:hover::-webkit-slider-runnable-track {
            background: rgba(255, 255, 255, 0.2);
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: currentColor;
            margin-top: -6px;
            box-shadow: 0 0 10px currentColor;
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover { 
            transform: scale(1.3); 
        }

        /* Action Buttons */
        .action-btn {
            transition: all 0.2s;
        }
        .action-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <!-- Main Simulation Canvas -->
    <canvas id="simCanvas"></canvas>

    <!-- Mobile Toggle Button (Visible only when panel is hidden or on small screens) -->
    <button id="togglePanelBtn" class="fixed bottom-4 right-4 z-[101] bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/10 text-white p-3 rounded-full shadow-lg transition-all md:hidden" onclick="UI.togglePanel()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="transition-transform duration-300" id="toggleIcon"><polyline points="18 15 12 9 6 15"></polyline></svg>
    </button>

    <!-- Glassmorphism Bottom Control Panel -->
    <div id="controlPanel" class="fixed bottom-0 left-0 w-full md:bottom-6 md:left-1/2 md:-translate-x-1/2 md:w-[90%] max-w-5xl bg-[#0a0a0f]/80 backdrop-blur-xl border-t md:border border-white/10 md:rounded-3xl p-5 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 items-center">
            
            <!-- Mass Control -->
            <div class="space-y-2">
                <div class="flex justify-between items-center text-purple-400">
                    <div class="flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="2"/></svg>
                        <label class="text-sm font-semibold">מסת החור השחור</label>
                    </div>
                    <span id="val-mass" class="text-xs font-mono bg-purple-500/20 px-2 py-1 rounded-md">200</span>
                </div>
                <input type="range" min="50" max="600" value="200" class="text-purple-400" oninput="Sim.setMass(this.value)">
            </div>

            <!-- Time Speed Control -->
            <div class="space-y-2">
                <div class="flex justify-between items-center text-green-400">
                    <div class="flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        <label class="text-sm font-semibold">קצב זמן</label>
                    </div>
                    <span id="val-speed" class="text-xs font-mono bg-green-500/20 px-2 py-1 rounded-md">1.0x</span>
                </div>
                <input type="range" min="0.1" max="4.0" step="0.1" value="1.0" class="text-green-400" oninput="Sim.setSpeed(this.value)">
            </div>

            <!-- Crazy Mode Control -->
            <div class="space-y-2">
                <div class="flex justify-between items-center text-pink-400">
                    <div class="flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                        <label class="text-sm font-semibold">שיגועים</label>
                    </div>
                    <span id="val-crazy" class="text-xs font-mono bg-pink-500/20 px-2 py-1 rounded-md">0</span>
                </div>
                <input type="range" min="0" max="100" value="0" class="text-pink-400" oninput="Sim.setCrazy(this.value)">
            </div>

            <!-- Trail & Buttons -->
            <div class="flex flex-col gap-3">
                <div class="flex justify-between items-center text-blue-400 gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                    <input type="range" min="5" max="100" value="30" class="text-blue-400 flex-1" oninput="Sim.setTrailLength(this.value)" title="אורך שובל">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="Sim.resetView()" class="action-btn flex items-center justify-center gap-2 py-1.5 bg-white/5 hover:bg-white/10 rounded-lg text-sm text-gray-300 border border-white/5">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                        מרכז
                    </button>
                    <button onclick="Sim.clearRays()" class="action-btn flex items-center justify-center gap-2 py-1.5 bg-red-500/10 hover:bg-red-500/20 rounded-lg text-sm text-red-300 border border-red-500/20">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        נקה
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        const CONFIG = {
            c: 8,               // Speed of light
            G: 1.0,             // Gravitational constant
            dt: 1.0,            // Time step
            maxRays: 800,       // Max active rays
            trailLength: 30     // History length
        };

        const State = {
            mass: 200,
            timeSpeed: 1.0,
            crazyMode: 0,
            rays: [],
            width: 0,
            height: 0,
            
            view: {
                x: 0,
                y: 0,
                zoom: 1.0,
                isDragging: false,
                lastX: 0,
                lastY: 0,
                hasMoved: false // Used to distinguish tap from drag
            },
            rs: 0,              // Schwarzschild Radius
            ps: 0               // Photon Sphere
        };

        // UI Manager
        const UI = {
            isPanelVisible: true,
            init() {
                // Auto-hide panel on mobile initially if screen is very small
                if (window.innerWidth < 768) {
                    this.togglePanel();
                }
            },
            togglePanel() {
                const panel = document.getElementById('controlPanel');
                const icon = document.getElementById('toggleIcon');
                this.isPanelVisible = !this.isPanelVisible;
                
                if (this.isPanelVisible) {
                    panel.classList.remove('panel-hidden');
                    icon.style.transform = 'rotate(0deg)';
                } else {
                    panel.classList.add('panel-hidden');
                    icon.style.transform = 'rotate(180deg)';
                }
            }
        };

        // Physics: Ray Class
        class Ray {
            constructor(x, y, vx, vy, color) {
                this.x = x;
                this.y = y;
                const mag = Math.sqrt(vx*vx + vy*vy);
                this.vx = (vx / mag) * CONFIG.c;
                this.vy = (vy / mag) * CONFIG.c;
                this.color = color;
                this.active = true;
                this.history = [];
            }

            update() {
                if (!this.active) return;

                this.history.push({x: this.x, y: this.y});
                if (this.history.length > CONFIG.trailLength) {
                    this.history.shift();
                }

                const dx = 0 - this.x;
                const dy = 0 - this.y;
                const distSq = dx*dx + dy*dy;
                const dist = Math.sqrt(distSq);

                if (dist <= State.rs) {
                    this.active = false;
                    return;
                }

                const force = (CONFIG.G * State.mass * 40) / (distSq); 
                const ax = force * (dx / dist);
                const ay = force * (dy / dist);
                const dt = CONFIG.dt * State.timeSpeed;

                this.vx += ax * dt;
                this.vy += ay * dt;

                const newMag = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
                this.vx = (this.vx / newMag) * CONFIG.c * State.timeSpeed;
                this.vy = (this.vy / newMag) * CONFIG.c * State.timeSpeed;

                this.x += this.vx;
                this.y += this.vy;

                if (dist > 5000) this.active = false;
            }

            draw(ctx) {
                if (this.history.length < 2) return;

                ctx.beginPath();
                ctx.moveTo(this.history[0].x, this.history[0].y);
                for (let i = 1; i < this.history.length; i++) {
                    ctx.lineTo(this.history[i].x, this.history[i].y);
                }
                ctx.lineTo(this.x, this.y);

                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2.5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.globalAlpha = 0.7;
                ctx.stroke();
                ctx.globalAlpha = 1.0;

                // Glowing head
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 5;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 1.5, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0; // reset
            }
        }

        // Main Simulation Engine
        const Sim = {
            canvas: null,
            ctx: null,
            initialPinchDist: null,
            initialZoom: 1,

            init() {
                this.canvas = document.getElementById('simCanvas');
                this.ctx = this.canvas.getContext('2d', { alpha: false });

                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                this.setupInputs();
                this.updateConstants();
                UI.init();
                this.loop();
            },

            resize() {
                State.width = window.innerWidth;
                State.height = window.innerHeight;
                this.canvas.width = State.width;
                this.canvas.height = State.height;
            },

            updateConstants() {
                State.rs = State.mass * 0.3; 
                State.ps = State.rs * 1.5;
            },

            setupInputs() {
                // Prevent context menu
                this.canvas.addEventListener('contextmenu', e => e.preventDefault());

                // Mouse Events
                this.canvas.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    const zoomSensitivity = 0.001;
                    const delta = -e.deltaY * zoomSensitivity;
                    const newZoom = State.view.zoom * Math.exp(delta);
                    if (newZoom > 0.1 && newZoom < 5.0) State.view.zoom = newZoom;
                }, { passive: false });

                this.canvas.addEventListener('mousedown', (e) => {
                    if (e.target !== this.canvas) return;
                    if (e.button === 0) { // Left click = Spawn
                        const worldPos = this.screenToWorld(e.clientX, e.clientY);
                        this.spawnBurst(worldPos.x, worldPos.y);
                    } else if (e.button === 2 || e.altKey) { // Right click or Alt = Pan
                        State.view.isDragging = true;
                        State.view.lastX = e.clientX;
                        State.view.lastY = e.clientY;
                        this.canvas.style.cursor = 'grabbing';
                    }
                });

                window.addEventListener('mousemove', (e) => {
                    if (State.view.isDragging) {
                        State.view.x += e.clientX - State.view.lastX;
                        State.view.y += e.clientY - State.view.lastY;
                        State.view.lastX = e.clientX;
                        State.view.lastY = e.clientY;
                    }
                });

                window.addEventListener('mouseup', () => {
                    State.view.isDragging = false;
                    this.canvas.style.cursor = 'crosshair';
                });

                // Touch Events (Mobile)
                this.canvas.addEventListener('touchstart', (e) => {
                    if (e.touches.length === 1) {
                        State.view.isDragging = true;
                        State.view.lastX = e.touches[0].clientX;
                        State.view.lastY = e.touches[0].clientY;
                        State.view.hasMoved = false;
                    } else if (e.touches.length === 2) {
                        this.initialPinchDist = Math.hypot(
                            e.touches[0].clientX - e.touches[1].clientX,
                            e.touches[0].clientY - e.touches[1].clientY
                        );
                        this.initialZoom = State.view.zoom;
                    }
                }, {passive: false});

                this.canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault(); // Prevent scrolling
                    if (e.touches.length === 1 && State.view.isDragging) {
                        const dx = e.touches[0].clientX - State.view.lastX;
                        const dy = e.touches[0].clientY - State.view.lastY;
                        // Tolerance for considering it a drag vs tap
                        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) State.view.hasMoved = true;
                        
                        State.view.x += dx;
                        State.view.y += dy;
                        State.view.lastX = e.touches[0].clientX;
                        State.view.lastY = e.touches[0].clientY;
                    } else if (e.touches.length === 2 && this.initialPinchDist) {
                        const dist = Math.hypot(
                            e.touches[0].clientX - e.touches[1].clientX,
                            e.touches[0].clientY - e.touches[1].clientY
                        );
                        const newZoom = this.initialZoom * (dist / this.initialPinchDist);
                        if (newZoom > 0.1 && newZoom < 5.0) State.view.zoom = newZoom;
                    }
                }, {passive: false});

                this.canvas.addEventListener('touchend', (e) => {
                    if (!State.view.hasMoved && e.changedTouches.length === 1 && !this.initialPinchDist) {
                        // It was a tap
                        const worldPos = this.screenToWorld(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
                        this.spawnBurst(worldPos.x, worldPos.y);
                    }
                    if (e.touches.length < 2) this.initialPinchDist = null;
                    if (e.touches.length === 0) State.view.isDragging = false;
                });
            },

            screenToWorld(sx, sy) {
                let x = sx - (State.width / 2) - State.view.x;
                let y = sy - (State.height / 2) - State.view.y;
                x /= State.view.zoom;
                y /= State.view.zoom;
                return { x, y };
            },

            spawnBurst(wx, wy) {
                const count = 40;
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 / count) * i;
                    const vx = Math.cos(angle);
                    const vy = Math.sin(angle);
                    State.rays.push(new Ray(wx, wy, vx, vy, '#4fd1c5'));
                }
            },

            spawnCrazy() {
                if (State.crazyMode <= 0) return;
                if (Math.random() * 100 > State.crazyMode) return;

                const visibleW = State.width / State.view.zoom;
                const visibleH = State.height / State.view.zoom;
                const side = Math.floor(Math.random() * 4);
                let x, y, vx, vy;
                const range = 1.2;

                if (side === 0) {
                    x = (Math.random() - 0.5) * visibleW * range;
                    y = -visibleH * 0.6;
                    vx = (Math.random() - 0.5); vy = 1; 
                } else if (side === 1) {
                    x = visibleW * 0.6;
                    y = (Math.random() - 0.5) * visibleH * range;
                    vx = -1; vy = (Math.random() - 0.5);
                } else if (side === 2) {
                    x = (Math.random() - 0.5) * visibleW * range;
                    y = visibleH * 0.6;
                    vx = (Math.random() - 0.5); vy = -1;
                } else {
                    x = -visibleW * 0.6;
                    y = (Math.random() - 0.5) * visibleH * range;
                    vx = 1; vy = (Math.random() - 0.5);
                }

                const colors = ['#f472b6', '#fbbf24', '#60a5fa', '#a78bfa', '#34d399'];
                State.rays.push(new Ray(x, y, vx, vy, colors[Math.floor(Math.random() * colors.length)]));
            },

            loop() {
                // Background
                this.ctx.fillStyle = '#030305';
                this.ctx.fillRect(0, 0, State.width, State.height);

                this.ctx.save();
                this.ctx.translate((State.width/2) + State.view.x, (State.height/2) + State.view.y);
                this.ctx.scale(State.view.zoom, State.view.zoom);

                this.drawBlackHole();

                for (let i = State.rays.length - 1; i >= 0; i--) {
                    const ray = State.rays[i];
                    ray.update();
                    ray.draw(this.ctx);
                    if (!ray.active) State.rays.splice(i, 1);
                }

                this.ctx.restore();

                if (State.rays.length > CONFIG.maxRays) {
                    State.rays.splice(0, State.rays.length - CONFIG.maxRays);
                }
                this.spawnCrazy();

                requestAnimationFrame(() => this.loop());
            },

            drawBlackHole() {
                const ctx = this.ctx;
                
                // Photon Sphere Glow
                ctx.beginPath();
                ctx.arc(0, 0, State.ps, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 140, 50, 0.1)';
                ctx.fill();
                
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'rgba(255, 140, 50, 0.8)';
                ctx.strokeStyle = 'rgba(255, 160, 50, 0.5)';
                ctx.lineWidth = 2 / State.view.zoom;
                ctx.stroke();
                ctx.shadowBlur = 0; // reset

                // Event Horizon
                ctx.beginPath();
                ctx.arc(0, 0, State.rs, 0, Math.PI * 2);
                ctx.fillStyle = '#000';
                ctx.fill();
                
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#fff';
                ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                ctx.lineWidth = 1.5 / State.view.zoom;
                ctx.stroke();
                ctx.shadowBlur = 0;
            },

            // --- Control Setters ---
            setMass(val) {
                State.mass = parseFloat(val);
                document.getElementById('val-mass').innerText = Math.round(State.mass);
                this.updateConstants();
            },
            setSpeed(val) {
                State.timeSpeed = parseFloat(val);
                document.getElementById('val-speed').innerText = State.timeSpeed.toFixed(1) + 'x';
            },
            setCrazy(val) {
                State.crazyMode = parseInt(val);
                document.getElementById('val-crazy').innerText = State.crazyMode;
            },
            setTrailLength(val) {
                CONFIG.trailLength = parseInt(val);
            },
            clearRays() {
                State.rays = [];
            },
            resetView() {
                State.view.x = 0;
                State.view.y = 0;
                State.view.zoom = 1.0;
            }
        };

        window.onload = () => Sim.init();

    </script>
</body>
</html>
